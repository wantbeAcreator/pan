name: Build

on:
  push:
    branches: [master]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: Generate config
        run: |
          printf 'package oss\nconst (\n    Endpoint        = "%s"\n    AccessKeyID     = "%s"\n    AccessKeySecret = "%s"\n    BucketName      = "%s"\n)\n' \
            "${{ secrets.OSS_ENDPOINT }}" \
            "${{ secrets.OSS_ACCESS_KEY_ID }}" \
            "${{ secrets.OSS_ACCESS_KEY_SECRET }}" \
            "${{ secrets.OSS_BUCKET }}" \
            > internal/oss/config.go
      - name: Verify config
        run: |
          echo "=== Checking config.go (hiding values) ==="
          grep -c '=""' internal/oss/config.go && echo "WARNING: some secrets are empty!" && exit 1 || echo "OK: all secrets are set"
      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libx11-dev libgl1-mesa-dev libxrandr-dev libxcursor-dev libxinerama-dev libxi-dev libxxf86vm-dev pkg-config
      - name: Build Linux
        run: make linux
      - uses: actions/upload-artifact@v4
        with:
          name: pan-linux-amd64
          path: dist/pan-linux-amd64

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          install: mingw-w64-x86_64-gcc
      - name: Generate config
        shell: bash
        run: |
          printf 'package oss\nconst (\n    Endpoint        = "%s"\n    AccessKeyID     = "%s"\n    AccessKeySecret = "%s"\n    BucketName      = "%s"\n)\n' \
            "${{ secrets.OSS_ENDPOINT }}" \
            "${{ secrets.OSS_ACCESS_KEY_ID }}" \
            "${{ secrets.OSS_ACCESS_KEY_SECRET }}" \
            "${{ secrets.OSS_BUCKET }}" \
            > internal/oss/config.go
      - name: Verify config
        shell: bash
        run: |
          echo "=== Checking config.go (hiding values) ==="
          grep -c '=""' internal/oss/config.go && echo "WARNING: some secrets are empty!" && exit 1 || echo "OK: all secrets are set"
      - name: Build Windows
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist
          $env:CGO_ENABLED = "1"
          $env:CC = "C:\msys64\mingw64\bin\gcc.exe"
          go build -ldflags="-s -w" -o dist\pan-windows-amd64.exe .
      - uses: actions/upload-artifact@v4
        with:
          name: pan-windows-amd64
          path: dist/pan-windows-amd64.exe

  darwin:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: Generate config
        run: |
          printf 'package oss\nconst (\n    Endpoint        = "%s"\n    AccessKeyID     = "%s"\n    AccessKeySecret = "%s"\n    BucketName      = "%s"\n)\n' \
            "${{ secrets.OSS_ENDPOINT }}" \
            "${{ secrets.OSS_ACCESS_KEY_ID }}" \
            "${{ secrets.OSS_ACCESS_KEY_SECRET }}" \
            "${{ secrets.OSS_BUCKET }}" \
            > internal/oss/config.go
      - name: Verify config
        run: |
          echo "=== Checking config.go (hiding values) ==="
          grep -c '=""' internal/oss/config.go && echo "WARNING: some secrets are empty!" && exit 1 || echo "OK: all secrets are set"
      - name: Build macOS
        run: make darwin-native
      - uses: actions/upload-artifact@v4
        with:
          name: pan-darwin-amd64
          path: dist/pan-darwin-amd64
